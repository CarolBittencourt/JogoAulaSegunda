<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Derby | Modern Racing</title>
    <link rel="stylesheet" href="style.css?v=1.1">
</head>

<body>
    <header>
        <div class="logo">Minimalist Derby</div>
        <div class="stats-container">
            <div class="stat-item">
                <span class="stat-label">Tempo</span>
                <span class="stat-value" id="timerText">00:10</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Seu Saldo</span>
                <span class="stat-value" id="balanceText">$1.000,00</span>
            </div>
        </div>
    </header>

    <main>
        <div id="track">
            <div class="finish-line-label">Linha de Chegada</div>
            <!-- Lanes injected by JS -->
        </div>
    </main>

    <section class="betting-panel">
        <div class="bet-entry-container">
            <div class="input-group">
                <label for="betAmount">VALOR DA APOSTA</label>
                <input type="number" id="betAmount" min="1" step="10" placeholder="0.00">
            </div>
            <div id="betErrorMessage" class="error-msg"></div>
            <div class="instruction">Clique em um cavalo para começar</div>
        </div>

        <div class="horses-selection" id="horseSelection">
            <!-- Horse Cards injected by JS -->
        </div>
    </section>

    <!-- Modal de Resultado -->
    <div id="resultModal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="resultTitle" style="font-size: 2.5rem; margin-bottom: 1rem;">FILTRADO</h2>
            <p id="resultMessage" style="font-size: 1.2rem; margin-bottom: 2rem; color: #BCC6CC;"></p>
            <div id="resultPayout" style="font-size: 2rem; font-weight: 700; margin-bottom: 3rem;"></div>

            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button id="closeModalBtn" style="background: var(--accent-green);">Nova Aposta</button>
                <button id="exitBtn"
                    style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">Sair</button>
            </div>
        </div>
    </div>

    <script src="script.js?v=1.1"></script>
</body>

</html>
